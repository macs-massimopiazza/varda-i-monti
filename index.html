<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CamsHub">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/000000/ffffff?text=C">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Walter+Turncoat&display=swap" rel="stylesheet">

    <title>Varda i monti</title>
    <style>
        :root {
            --google-blue: #4285f4;
            --brutal-black: #000;
            --bg-gray: #f8f9fa;
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: "Walter Turncoat", -apple-system, system-ui, sans-serif;
            font-weight: 400;
            font-style: normal;
            background-color: rgb(250, 242, 221);
            padding: calc(var(--safe-top) + 20px) 16px 20px 16px;
            user-select: none;
            /* background: url(icons/icon-512x512.png); */
            /* background-size: 100%; */
        }

        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin-bottom: 24px; border-bottom: 4px solid var(--brutal-black); display: inline-block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            border: 3px solid var(--brutal-black);
            background: url(icons/icon-512x512.png);
            background-size: cover;
            background-color: rgb(250, 244, 230);
            aspect-ratio: 1/1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            box-shadow: 4px 4px 0px var(--brutal-black);
            border-top-left-radius: 255px 15px;
            border-top-right-radius: 15px 225px;
            border-bottom-right-radius: 225px 15px;
            border-bottom-left-radius: 15px 255px;
        }

        .card:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--brutal-black);
        }

        .card-name { font-weight: 800; font-size: 14px; text-transform: uppercase; }

        #app-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #fff;
            z-index: 1000;
            display: none;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #app-overlay.active { display: flex; transform: translateY(0); }

        .nav-bar {
            padding: var(--safe-top) 16px 15px 16px;
            background-color: rgb(250, 242, 221);
            border-bottom: 3px solid var(--brutal-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: var(--brutal-black);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: 900;
            text-transform: uppercase;
            border-top-right-radius: 255px 15px;
            border-top-left-radius: 15px 225px;
            border-bottom-left-radius: 225px 15px;
            border-bottom-right-radius: 15px 255px;
        }

        .frame-wrapper {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            -webkit-overflow-scrolling: touch; /* Fluidità scroll su iOS */
        }

        #webcam-frame {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

<h1>Varda i monti</h1>

<div class="grid" id="mainGrid"></div>

<div id="app-overlay">
    <div class="nav-bar">
        <span id="overlay-title" style="font-weight: 800;">CAM_NAME</span>
        <button class="close-btn" onclick="closeCam()">Chiudi</button>
    </div>
    <div class="frame-wrapper">
        <iframe 
          id="webcam-frame" 
          src="" 
          sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox" 
          allowfullscreen>
        ></iframe>
    </div>
</div>

<script>
    // Registrazione Service Worker per PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const data = [
        { nome: "Alpe Lusia", url: "https://www.alpelusia.it/it/inverno/webcam" },
        { nome: "San Giorgio", url: "https://www.altalessinia.it/webcam/" },
        { nome: "Passo Rolle", url: "https://www.dolomitisuperski.com/it/live-info/webcam/san-martino-di-castrozza-passo-rolle"},
        { nome: "Folgaria", url: "https://folgaria.panomax.com/salizzona"},
        { nome: "Paganella", url "https://www.paganella.net/it/webcam"}
    ];

    const grid = document.getElementById('mainGrid');
    const overlay = document.getElementById('app-overlay');
    const iframe = document.getElementById('webcam-frame');
    const title = document.getElementById('overlay-title');

    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="card-name">${item.nome}</div>`;
        card.onclick = () => openCam(item);
        grid.appendChild(card);
    });

    function openCam(item) {
        title.innerText = item.nome.toUpperCase();
        iframe.src = item.url;
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('active'), 10);
    }

    function closeCam() {
        overlay.classList.remove('active');
        setTimeout(() => {
            overlay.style.display = 'none';
            iframe.src = '';
        }, 400);
    }
</script>
</body>
</html>
